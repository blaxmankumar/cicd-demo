name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Login to Docker Hub
        # Using the official action is more secure and reliable than 'echo | docker login'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        # Merging build and push into one step prevents issues if the runner environment clears cache
        run: |
          docker build -t "${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest" .
          docker push "${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the latest image
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest
            # Stop and remove existing container if it exists
            sudo docker stop cicd-demo || true
            sudo docker rm cicd-demo || true
            # Run the new container
            sudo docker run -d --name cicd-demo -p 3000:3000 ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest
            # Cleanup old unused images to save disk space
            sudo docker image prune -f

      - name: Done
        run: echo "Deployment Successful!"
