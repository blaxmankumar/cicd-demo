name: CI/CD Pipeline

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::947894440870:role/cloudd
          aws-region: us-east-1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest

      - name: Deploy to EC2 using SSM
        run: |
          aws ssm send-command \
            --instance-ids "i-09ec02e3e71896197" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy application" \
            --parameters commands='[
              "sudo docker pull ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest",
              "sudo docker stop cicd-demo || true",
              "sudo docker rm cicd-demo || true",
              "sudo docker run -d --name cicd-demo -p 3000:3000 ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest",
              "sudo docker image prune -f"
            ]' \
            --region us-east-1

      - name: Done
        run: echo "Deployment Successful!"
